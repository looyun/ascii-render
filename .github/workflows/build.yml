name: Build Binaries

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: ascii-render-linux
          - os: macos-latest
            artifact: ascii-render-macos
          - os: windows-latest
            artifact: ascii-render-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[build]"

      - name: Create entry point script
        run: |
          cat > run_cli.py << 'EOF'
          #!/usr/bin/env python3
          import sys
          from ascii_render.cli import main
          if __name__ == "__main__":
              sys.exit(main())
          EOF

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name ${{ matrix.artifact }} \
            --collect-all ascii_render \
            run_cli.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}*

      - name: Clean up
        run: rm -f run_cli.py