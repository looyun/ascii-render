name: Build Binaries

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: ascii-render-linux
          - os: macos-latest
            artifact: ascii-render-macos
          - os: windows-latest
            artifact: ascii-render-windows.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[build]"

      - name: Build with PyInstaller
        run: pyinstaller --onefile --name ${{ matrix.artifact }} --collect-all ascii_render run_cli.py

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.artifact }}*
            拿来心心.gif
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}*

      - name: Clean up
        run: del run_cli.py 2>NUL || true